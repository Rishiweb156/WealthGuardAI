services:
  # Backend API Service
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: wealthguard-ai-backend-1
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
      - ./src:/app/src
      - ./server.py:/app/server.py
    environment:
      - MLFLOW_TRACKING_URI=http://mlflow:5000
      - OLLAMA_HOST=http://host.docker.internal:11434
      - PYTHONUNBUFFERED=1
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - wealthguard-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Streamlit Frontend Service
  streamlit:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: wealthguard_streamlit
    ports:
      - "8501:8501"
    volumes:
      - ./app.py:/app/app.py
      - ./data:/app/data  # ✅ CRITICAL: Share data folder with frontend
    environment:
      - API_URL=http://backend:8000
      - PYTHONUNBUFFERED=1
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - wealthguard-network

  # MLflow Tracking Server
  mlflow:
    image: ghcr.io/mlflow/mlflow:v2.9.2
    container_name: wealthguard_mlflow
    ports:
      - "5000:5000"
    volumes:
      - ./logs/mlruns:/mlflow/mlruns
    command: >
      mlflow server
      --backend-store-uri file:///mlflow/mlruns
      --default-artifact-root file:///mlflow/mlruns
      --host 0.0.0.0
      --port 5000
    networks:
      - wealthguard-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

networks:
  wealthguard-network:
    driver: bridge